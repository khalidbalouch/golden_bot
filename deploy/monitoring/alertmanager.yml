global:
  resolve_timeout: 5m
  slack_api_url: 'https://hooks.slack.com/services/XXXX/YYYY/ZZZZ'
route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'slack-alerts'
  routes:
    - match:
        severity: 'CRITICAL'
      receiver: 'pagerduty-critical'
      continue: true
receivers:
  - name: 'slack-alerts'
    slack_configs:
      - channel: '#bot-alerts'
        send_resolved: true
        title: '{{ .CommonLabels.alertname }}'
        text: '{{ .CommonAnnotations.summary }}'
  - name: 'pagerduty-critical'
    pagerduty_configs:
      - service_key: 'YOUR_PD_KEY'
        severity: 'critical'
        description: '{{ .CommonLabels.alertname }}'
