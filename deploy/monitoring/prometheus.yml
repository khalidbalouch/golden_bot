global:
  scrape_interval: 15s
  evaluation_interval: 15s
scrape_configs:
  - job_name: 'golden_bot'
    static_configs:
      - targets: ['golden-bot-app:9090']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
