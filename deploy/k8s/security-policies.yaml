apiVersion: v1
kind: ServiceAccount
metadata:
  name: golden-bot
  namespace: default
automountServiceAccountToken: false
---
apiVersion: policy/v1
kind: PodSecurityPolicy
metadata:
  name: golden-bot-psp
spec:
  privileged: false; allowPrivilegeEscalation: false
  requiredDropCapabilities: ["ALL"]
  volumes: ["configMap","emptyDir","projected","secret","persistentVolumeClaim"]
  hostNetwork: false; hostIPC: false; hostPID: false
  runAsUser: {rule: "MustRunAsNonRoot"}
  seLinux: {rule: "RunAsAny"}
  supplementalGroups: {rule: "MustRunAs", ranges: [{min: 1, max: 65535}]}
  fsGroup: {rule: "MustRunAs", ranges: [{min: 1, max: 65535}]}
  readOnlyRootFilesystem: true
